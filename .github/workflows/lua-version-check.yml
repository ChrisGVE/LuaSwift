name: Check and Update Lua Versions

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      new_versions: ${{ steps.check.outputs.new_versions }}
      updates_json: ${{ steps.check.outputs.updates_json }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for new Lua releases
        id: check
        run: |
          # Fetch Lua FTP directory listing
          curl -s https://www.lua.org/ftp/ > /tmp/lua_ftp.html

          # Extract version numbers from tarball links
          VERSIONS=$(grep -oP 'lua-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' /tmp/lua_ftp.html | sort -V | uniq)

          # Current bundled versions (update these when versions change)
          declare -A BUNDLED=(
            ["5.1"]="5.1.5"
            ["5.2"]="5.2.4"
            ["5.3"]="5.3.6"
            ["5.4"]="5.4.7"
            ["5.5"]="5.5.0"
          )

          # Check for new versions in each major.minor series
          NEW_VERSIONS=""
          UPDATES_JSON="["
          FIRST=true

          for series in "5.1" "5.2" "5.3" "5.4" "5.5"; do
            LATEST=$(echo "$VERSIONS" | grep "^$series" | tail -1)
            CURRENT="${BUNDLED[$series]}"
            if [ -n "$LATEST" ] && [ "$LATEST" != "$CURRENT" ]; then
              NEW_VERSIONS="$NEW_VERSIONS $series:$CURRENT->$LATEST"
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                UPDATES_JSON="$UPDATES_JSON,"
              fi
              # Capture the SHA256 lua.org publishes for the new tarball. The
              # FTP listing already fetched above carries a `checksum (sha256)`
              # column: each tarball row is immediately followed by a
              # `<TD CLASS="sum">…</TD>` cell holding the official checksum. We
              # grab the line after the tarball link and strip the HTML tags.
              # This is the source of truth the download step verifies against.
              SHA256=$(grep -A3 "lua-${LATEST}.tar.gz\"" /tmp/lua_ftp.html \
                | grep 'CLASS="sum"' \
                | sed -E 's/.*CLASS="sum">([a-f0-9]{64}).*/\1/' \
                | head -1)
              UPDATES_JSON="$UPDATES_JSON{\"series\":\"$series\",\"old\":\"$CURRENT\",\"new\":\"$LATEST\",\"sha256\":\"$SHA256\"}"
            fi
          done

          UPDATES_JSON="$UPDATES_JSON]"

          echo "new_versions=$NEW_VERSIONS" >> $GITHUB_OUTPUT
          echo "updates_json=$UPDATES_JSON" >> $GITHUB_OUTPUT

          if [ -n "$NEW_VERSIONS" ]; then
            echo "::notice::New Lua versions available:$NEW_VERSIONS"
          else
            echo "::notice::All Lua versions are up to date"
          fi

  update-sources:
    needs: check-versions
    if: needs.check-versions.outputs.new_versions != ''
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and update Lua sources
        env:
          UPDATES_JSON: ${{ needs.check-versions.outputs.updates_json }}
        run: |
          echo "Updates to process: $UPDATES_JSON"

          # IMPORTANT: Never modify the root LICENSE file (GitHub license detection)
          # Only CLua*/LICENSE files (Lua's MIT license) are managed by this workflow

          # Parse JSON and process each update
          echo "$UPDATES_JSON" | jq -c '.[]' | while read -r update; do
            SERIES=$(echo "$update" | jq -r '.series')
            OLD_VERSION=$(echo "$update" | jq -r '.old')
            NEW_VERSION=$(echo "$update" | jq -r '.new')
            EXPECTED_SHA256=$(echo "$update" | jq -r '.sha256')

            echo "Updating Lua $SERIES: $OLD_VERSION -> $NEW_VERSION"

            # Determine target directory
            case "$SERIES" in
              "5.1") TARGET_DIR="Sources/CLua51" ;;
              "5.2") TARGET_DIR="Sources/CLua52" ;;
              "5.3") TARGET_DIR="Sources/CLua53" ;;
              "5.4") TARGET_DIR="Sources/CLua" ;;
              "5.5") TARGET_DIR="Sources/CLua55" ;;
            esac

            # Download new version
            TARBALL="lua-${NEW_VERSION}.tar.gz"
            curl -LO "https://www.lua.org/ftp/$TARBALL"

            # Supply-chain integrity gate: verify the downloaded tarball against
            # the SHA256 lua.org publishes for it (captured in the check job from
            # the FTP listing's `checksum (sha256)` column) BEFORE it is allowed
            # to replace any vendored source. lua.org does not provide a hardcode-
            # able pinned checksum ahead of release, so we pin against the
            # official published checksum for the exact version we are pulling,
            # which is the most robust check this auto-discovering flow allows.
            # Any mismatch (or a missing/garbled published checksum) fails the job.
            if [ -z "$EXPECTED_SHA256" ] || ! echo "$EXPECTED_SHA256" | grep -qE '^[a-f0-9]{64}$'; then
              echo "ERROR: no valid published SHA256 for lua-${NEW_VERSION}.tar.gz; refusing to replace sources."
              exit 1
            fi
            ACTUAL_SHA256=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
            if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
              echo "ERROR: SHA256 mismatch for $TARBALL"
              echo "  expected (lua.org): $EXPECTED_SHA256"
              echo "  actual (download):  $ACTUAL_SHA256"
              exit 1
            fi
            echo "Verified $TARBALL against lua.org SHA256: $EXPECTED_SHA256"

            # Record provenance for this series in the vendored-Lua manifest.
            # The manifest table row for the series is rewritten with the new
            # version, source URL, the verified SHA256, and today's UTC date.
            MANIFEST="Sources/VENDORED-LUA.md"
            UPDATE_DATE=$(date -u +%Y-%m-%d)
            TARBALL_URL="https://www.lua.org/ftp/$TARBALL"
            # Match the manifest row by its leading "| <series> |" cell and
            # replace the whole row. Column widths are normalised to single
            # spaces; the table stays valid GFM (alignment is cosmetic).
            awk -v series="$SERIES" -v ver="$NEW_VERSION" -v dir="$TARGET_DIR" \
                -v url="$TARBALL_URL" -v sha="$EXPECTED_SHA256" -v dt="$UPDATE_DATE" '
              $0 ~ ("^\\| " series " ") {
                printf "| %s | %s | `%s` | %s | `%s` | %s |\n", series, ver, dir, url, sha, dt
                next
              }
              { print }
            ' "$MANIFEST" > "$MANIFEST.tmp" && mv "$MANIFEST.tmp" "$MANIFEST"
            echo "Recorded provenance for Lua $SERIES in $MANIFEST"

            # Extract to temp directory
            tar xzf "$TARBALL"
            EXTRACT_DIR="lua-${NEW_VERSION}"

            # Backup LICENSE file if it exists
            if [ -f "$TARGET_DIR/LICENSE" ]; then
              cp "$TARGET_DIR/LICENSE" /tmp/lua_license_backup
            fi

            # Backup module.modulemap
            if [ -f "$TARGET_DIR/include/module.modulemap" ]; then
              cp "$TARGET_DIR/include/module.modulemap" /tmp/modulemap_backup
            fi

            # Remove old source files (keep directory structure)
            rm -f "$TARGET_DIR"/*.c
            rm -f "$TARGET_DIR"/include/*.h

            # Copy new source files
            cp "$EXTRACT_DIR/src"/*.c "$TARGET_DIR/"
            cp "$EXTRACT_DIR/src"/*.h "$TARGET_DIR/include/"

            # Remove lua.c and luac.c (standalone interpreter files)
            rm -f "$TARGET_DIR/lua.c" "$TARGET_DIR/luac.c"

            # Restore LICENSE
            if [ -f /tmp/lua_license_backup ]; then
              cp /tmp/lua_license_backup "$TARGET_DIR/LICENSE"
            fi

            # Restore module.modulemap
            if [ -f /tmp/modulemap_backup ]; then
              cp /tmp/modulemap_backup "$TARGET_DIR/include/module.modulemap"
            fi

            # Cleanup
            rm -rf "$EXTRACT_DIR" "$TARBALL"

            echo "Updated $TARGET_DIR to Lua $NEW_VERSION"
          done

      - name: Update Package.swift version comments
        env:
          UPDATES_JSON: ${{ needs.check-versions.outputs.updates_json }}
        run: |
          # Update version comments in Package.swift
          echo "$UPDATES_JSON" | jq -c '.[]' | while read -r update; do
            OLD_VERSION=$(echo "$update" | jq -r '.old')
            NEW_VERSION=$(echo "$update" | jq -r '.new')

            # Update version references in Package.swift
            sed -i '' "s/$OLD_VERSION/$NEW_VERSION/g" Package.swift
          done

      - name: Update workflow bundled versions
        env:
          UPDATES_JSON: ${{ needs.check-versions.outputs.updates_json }}
        run: |
          # Update the BUNDLED array in this workflow file
          echo "$UPDATES_JSON" | jq -c '.[]' | while read -r update; do
            SERIES=$(echo "$update" | jq -r '.series')
            OLD_VERSION=$(echo "$update" | jq -r '.old')
            NEW_VERSION=$(echo "$update" | jq -r '.new')

            # Update the bundled version in the workflow
            sed -i '' "s/\[\"$SERIES\"\]=\"$OLD_VERSION\"/[\"$SERIES\"]=\"$NEW_VERSION\"/g" .github/workflows/lua-version-check.yml
          done

      - name: Update CHANGELOG
        env:
          UPDATES_JSON: ${{ needs.check-versions.outputs.updates_json }}
        run: |
          # Generate changelog entry for Lua updates
          DATE=$(date +%Y-%m-%d)

          # Build the update list
          UPDATES=""
          echo "$UPDATES_JSON" | jq -c '.[]' | while read -r update; do
            SERIES=$(echo "$update" | jq -r '.series')
            OLD_VERSION=$(echo "$update" | jq -r '.old')
            NEW_VERSION=$(echo "$update" | jq -r '.new')
            UPDATES="$UPDATES\n- Lua $SERIES: $OLD_VERSION → $NEW_VERSION"
          done

          # Also update the Lua Versions table in CHANGELOG
          echo "$UPDATES_JSON" | jq -c '.[]' | while read -r update; do
            SERIES=$(echo "$update" | jq -r '.series')
            OLD_VERSION=$(echo "$update" | jq -r '.old')
            NEW_VERSION=$(echo "$update" | jq -r '.new')

            # Update the version table
            sed -i '' "s/| $SERIES    | $OLD_VERSION           |/| $SERIES    | $NEW_VERSION           |/g" CHANGELOG.md
          done

          # Add entry under [Unreleased] section
          # Find the line after "## [Unreleased]" and add the update
          UPDATES_LIST=$(echo "$UPDATES_JSON" | jq -r '.[] | " Lua \(.series): \(.old) → \(.new)"' | tr '\n' ',' | sed 's/,$//')
          ENTRY="### Changed ($(date +%Y-%m-%d))\n- Updated bundled Lua sources:${UPDATES_LIST}\n"

          # Insert after the [Unreleased] line using awk (more portable than sed -i with newlines)
          awk -v entry="$ENTRY" '/^## \[Unreleased\]/{print; print ""; printf entry; print ""; next}1' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      - name: Verify root LICENSE unchanged
        run: |
          # Ensure root LICENSE file was not modified (GitHub license detection)
          if git diff --name-only | grep -q "^LICENSE$"; then
            echo "ERROR: Root LICENSE file was modified. Restoring..."
            git checkout LICENSE
          fi

      - name: Run tests with default Lua version (5.4)
        run: |
          swift test

      - name: Run tests with Lua 5.5
        run: |
          rm -rf .build
          LUASWIFT_LUA_VERSION=55 swift test

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            feat: update Lua sources to latest versions

            ${{ needs.check-versions.outputs.new_versions }}

            Automated update by lua-version-check workflow.
            All tests pass with Lua 5.4 and 5.5.

            🤖 Generated with GitHub Actions
          branch: lua-version-update
          delete-branch: true
          title: "feat: Update Lua sources: ${{ needs.check-versions.outputs.new_versions }}"
          body: |
            ## Automated Lua Version Update

            New Lua versions detected and updated:

            ${{ needs.check-versions.outputs.new_versions }}

            ### Changes
            - Downloaded new Lua source tarballs from lua.org
            - Verified each tarball against the SHA256 published by lua.org before replacing sources
            - Updated CLua* directories with new sources
            - Recorded source URL, verified SHA256, and update date in Sources/VENDORED-LUA.md
            - Updated version references in Package.swift
            - Updated CHANGELOG.md with new versions

            ### Test Results
            - ✅ All tests pass with Lua 5.4 (default)
            - ✅ All tests pass with Lua 5.5

            ### Review Checklist
            - [ ] Verify source files are correctly updated
            - [ ] Check for any API changes in release notes
            - [ ] Confirm no breaking changes

            ---
            🤖 This PR was automatically created by the [lua-version-check](.github/workflows/lua-version-check.yml) workflow.
          labels: |
            lua-update
            automated-pr
            enhancement
